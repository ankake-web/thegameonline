<!doctype html>
<html lang="ja">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover" />
<title>The Game 風 Online</title>
<style>
:root{--bg:#101114;--card:#1b1d23;--text:#f7f7f7;--muted:#aeb3c2;--accent:#ffe066;--danger:#ff5c5c;--ok:#54d17a;--blue:#66a3ff}*{box-sizing:border-box}body{margin:0;background:radial-gradient(circle at top,#2b2f3c,#101114 55%);color:var(--text);font-family:-apple-system,BlinkMacSystemFont,"Helvetica Neue",sans-serif}header{position:sticky;top:0;z-index:10;background:#101114ee;backdrop-filter:blur(8px);padding:12px 14px;border-bottom:1px solid #ffffff17}h1{font-size:20px;margin:0}main{max-width:820px;margin:0 auto;padding:12px}.box{background:#1b1d23e8;border:1px solid #ffffff18;border-radius:18px;padding:14px;margin:10px 0;box-shadow:0 8px 24px #0005}.row{display:flex;gap:8px;flex-wrap:wrap;align-items:center}button,input,select{font-size:16px;border-radius:12px;border:0;padding:11px 12px}input,select{background:#fff;color:#111;min-width:120px}button{background:#3b4155;color:white;font-weight:700}button.primary{background:#2f6df6}button.good{background:#168c43}button.warn{background:#a83232}button.gold{background:#b98900}button:disabled{opacity:.45}.small{font-size:13px;color:var(--muted);line-height:1.45}.status{font-weight:800;line-height:1.55}.piles{display:grid;grid-template-columns:1fr 1fr;gap:10px}.pile{background:#f8f8f8;color:#111;border-radius:18px;padding:13px 8px;text-align:center;min-height:98px;border:4px solid transparent}.pile.can{border-color:var(--accent);box-shadow:0 0 20px #ffe06688}.pile-title{font-size:14px;color:#555;font-weight:700}.pile-value{font-size:42px;font-weight:900;line-height:1.05}.hand{display:flex;flex-wrap:wrap;gap:8px}.card{width:54px;height:76px;background:#fff;color:#111;border:3px solid #ddd;border-radius:14px;display:flex;align-items:center;justify-content:center;font-size:25px;font-weight:900;box-shadow:0 5px 0 #0005}.card.selected{background:var(--accent);transform:translateY(-5px);border-color:#fff}.card.locked{opacity:.55}.badge{display:inline-block;background:#303445;border:1px solid #ffffff25;border-radius:999px;padding:5px 9px;margin:2px;font-size:13px}.hidden{padding:28px;text-align:center;border-radius:14px;background:#2c3040;color:var(--muted)}#resultOverlay{position:fixed;inset:0;z-index:99;display:none;align-items:center;justify-content:center;text-align:center;padding:24px;background:#000c}.resultCard{width:min(92vw,520px);border-radius:28px;padding:28px 18px;background:#181b24;border:1px solid #fff3;box-shadow:0 0 60px #000}.rank{font-size:44px;font-weight:1000;letter-spacing:.03em;margin:8px 0}.perfect{color:#ffe066;text-shadow:0 0 24px #ffe066}.amazing{color:#66a3ff;text-shadow:0 0 24px #66a3ff}.great{color:#54d17a;text-shadow:0 0 24px #54d17a}.try{color:#ff5c5c;text-shadow:0 0 24px #ff5c5c}.confetti{position:fixed;top:-12px;width:10px;height:16px;z-index:120;animation:fall 2.6s linear forwards}@keyframes fall{to{transform:translateY(110vh) rotate(720deg);opacity:.2}}.flashWin{animation:flashWin .9s ease 2}@keyframes flashWin{50%{filter:brightness(1.7)}}.shake{animation:shake .35s linear 3}@keyframes shake{25%{transform:translateX(-5px)}50%{transform:translateX(5px)}75%{transform:translateX(-3px)}}
</style>
</head>
<body>
<header><h1>The Game 風 Online</h1><div class="small">複数人・複数台スマホ対応 / 1〜5人</div></header>
<main>
<div id="setup" class="box"><div class="row"><select id="playerCount"><option value="1">1人用</option><option value="2" selected>2人用</option><option value="3">3人用</option><option value="4">4人用</option><option value="5">5人用</option></select><input id="roomInput" placeholder="部屋ID 任意"><input id="nameInput" placeholder="名前 任意"></div><div class="row" style="margin-top:10px"><button class="primary" onclick="createRoom()">部屋を作る</button><button class="good" onclick="joinRoom()">部屋に入る</button><button onclick="startSolo()">この端末で1人用</button></div><p class="small">Firebase設定を入れた後、同じURLを各スマホで開きます。1台目が部屋作成、他の人は部屋IDで参加。</p></div>
<div id="lobby" class="box" style="display:none"><div class="status" id="lobbyStatus"></div><div id="players"></div><div class="row" style="margin-top:10px"><button class="primary" id="startBtn" onclick="startOnlineGame()">ゲーム開始</button><button onclick="copyRoom()">部屋IDコピー</button><button class="warn" onclick="leaveLocal()">退出</button></div></div>
<div id="game" style="display:none"><div class="box"><div class="status" id="status"></div><div class="row" style="margin-top:10px"><button class="gold" onclick="toggleBgm()">BGM ON/OFF</button><button class="primary" onclick="endTurn()">ターン終了</button><button onclick="showRules()">ルール</button><button class="warn" onclick="forceGiveUp()">ギブアップ/終了</button></div><div class="small" id="hint"></div></div><div class="box"><h2 style="font-size:17px;margin:0 0 10px">場</h2><div class="piles" id="piles"></div></div><div class="box"><h2 id="handTitle" style="font-size:17px;margin:0 0 10px">手札</h2><div id="hand"></div></div></div>
</main>
<div id="resultOverlay"><div class="resultCard"><div class="small">RESULT</div><div id="rankText" class="rank"></div><div id="resultDetail" style="font-size:20px;font-weight:800"></div><div id="resultMsg" class="small" style="margin:12px 0 18px"></div><button onclick="closeResult()">閉じる</button><button class="primary" onclick="resetSameRoom()">同じ部屋でもう一回</button></div></div>
<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.5/firebase-app.js";
import { getFirestore, doc, setDoc, getDoc, updateDoc, onSnapshot, serverTimestamp } from "https://www.gstatic.com/firebasejs/10.12.5/firebase-firestore.js";
const firebaseConfig = {
  apiKey: "AIzaSyA0qKOQfnJjqsTrZJe5OA9Jd7LSGkWGLcg",
  authDomain: "thegameonline.firebaseapp.com",
  projectId: "thegameonline",
  storageBucket: "thegameonline.firebasestorage.app",
  messagingSenderId: "549817836803",
  appId: "1:549817836803:web:76dfa04565089923ecf536",
  measurementId: "G-3FE7CNX811"
};
let app, db; try{app=initializeApp(firebaseConfig);db=getFirestore(app)}catch(e){console.warn("Firebase未設定",e)}
let roomId="",myId="",unsub=null,game=null,selectedIndex=null,bgmOn=false,audioCtx=null,bgmTimer=null,localMode=false;
Object.assign(window,{createRoom,joinRoom,startOnlineGame,startSolo,selectCard,playPile,endTurn,toggleBgm,showRules,forceGiveUp,closeResult,resetSameRoom,copyRoom,leaveLocal});
function uid(){return"p_"+Math.random().toString(36).slice(2,8)}function roomCode(){return Math.floor(1000+Math.random()*9000).toString()}function shuffle(a){for(let i=a.length-1;i>0;i--){let j=Math.floor(Math.random()*(i+1));[a[i],a[j]]=[a[j],a[i]]}}function handSize(n){return n===1?8:(n===2?7:6)}function minPlay(g){return g.deck.length>0?2:1}function remaining(g){return g.deck.length+Object.values(g.hands||{}).reduce((s,h)=>s+h.length,0)}function canPlay(card,pile){return pile.type==="up"?(card>pile.value||card===pile.value-10):(card<pile.value||card===pile.value+10)}function legalExists(g,pid){return(g.hands[pid]||[]).some(c=>g.piles.some(p=>canPlay(c,p)))}function isMyTurn(){return game&&game.currentPlayer===myId&&game.status==="playing"}
async function createRoom(){if(!db){alert("Firebase設定が未入力です");return}const n=Number(document.getElementById("playerCount").value);roomId=document.getElementById("roomInput").value.trim()||roomCode();myId=uid();const name=document.getElementById("nameInput").value.trim()||"P1";const ref=doc(db,"rooms",roomId);await setDoc(ref,{roomId,hostId:myId,playerCount:n,status:"lobby",players:{[myId]:{name,seat:1}},createdAt:serverTimestamp(),updatedAt:serverTimestamp()});listen(ref)}
async function joinRoom(){if(!db){alert("Firebase設定が未入力です");return}roomId=document.getElementById("roomInput").value.trim();if(!roomId){alert("部屋IDを入れてください");return}const ref=doc(db,"rooms",roomId);const snap=await getDoc(ref);if(!snap.exists()){alert("部屋がありません");return}const d=snap.data();if(d.status!=="lobby"){alert("すでに開始済みです");return}const players=d.players||{};if(Object.keys(players).length>=d.playerCount){alert("満員です");return}myId=uid();const seat=Object.keys(players).length+1;const name=document.getElementById("nameInput").value.trim()||("P"+seat);players[myId]={name,seat};await updateDoc(ref,{players,updatedAt:serverTimestamp()});listen(ref)}
function listen(ref){if(unsub)unsub();localMode=false;unsub=onSnapshot(ref,snap=>{game=snap.data();selectedIndex=null;renderAll();if(game&&game.status==="ended"&&game.result&&!document.body.dataset.resultShown){document.body.dataset.resultShown="1";showResult(game.result.remaining,game.result.reason)}})}
async function startOnlineGame(){if(!game||game.hostId!==myId){alert("開始できるのは部屋を作った人だけです");return}if(Object.keys(game.players).length<game.playerCount){alert("まだ人数が揃っていません");return}const next=buildGame(game.playerCount,game.players);await updateDoc(doc(db,"rooms",roomId),next)}
function buildGame(n,players){const deck=[];for(let i=2;i<=99;i++)deck.push(i);shuffle(deck);const hands={};const ids=Object.keys(players).sort((a,b)=>players[a].seat-players[b].seat);ids.forEach(id=>{hands[id]=[];for(let i=0;i<handSize(n);i++)hands[id].push(deck.pop());hands[id].sort((a,b)=>a-b)});return{status:"playing",deck,hands,piles:[{type:"up",value:1,name:"昇順A ↑"},{type:"up",value:1,name:"昇順B ↑"},{type:"down",value:100,name:"降順C ↓"},{type:"down",value:100,name:"降順D ↓"}],turnOrder:ids,currentPlayer:ids[0],playedThisTurn:0,result:null,updatedAt:serverTimestamp()}}
function startSolo(){myId="solo";game={roomId:"solo",hostId:"solo",playerCount:1,status:"playing",players:{solo:{name:"自分",seat:1}},...buildGame(1,{solo:{name:"自分",seat:1}})};localMode=true;renderAll()}
async function saveGame(g){game=g;if(localMode){renderAll();return}await updateDoc(doc(db,"rooms",roomId),{...g,updatedAt:serverTimestamp()})}
function selectCard(i){if(!isMyTurn()&&!localMode)return;selectedIndex=i;renderAll()}
async function playPile(i){if(!isMyTurn()&&!localMode){alert("今は自分のターンではありません");return}if(selectedIndex===null)return;const card=game.hands[myId][selectedIndex];if(!canPlay(card,game.piles[i])){playBad();alert("そこには出せません");return}const g=structuredClone(game);g.piles[i].value=card;g.hands[myId].splice(selectedIndex,1);g.playedThisTurn++;selectedIndex=null;playGood();if(remaining(g)===0){await endGame(g,"全カードを出し切り");return}if(g.playedThisTurn<minPlay(g)&&!legalExists(g,myId)){await endGame(g,"必要枚数を出す前に合法手なし");return}await saveGame(g)}
async function endTurn(){if(!isMyTurn()&&!localMode){alert("今は自分のターンではありません");return}const need=minPlay(game);if(game.playedThisTurn<need){alert("最低"+need+"枚出してください");return}const g=structuredClone(game);while(g.hands[myId].length<handSize(g.playerCount)&&g.deck.length>0)g.hands[myId].push(g.deck.pop());g.hands[myId].sort((a,b)=>a-b);const idx=g.turnOrder.indexOf(myId);g.currentPlayer=g.turnOrder[(idx+1)%g.turnOrder.length];g.playedThisTurn=0;if(!legalExists(g,g.currentPlayer)){await endGame(g,"次プレイヤーに合法手なし");return}await saveGame(g)}
async function forceGiveUp(){if(!game||game.status!=="playing")return;if(confirm("このゲームを終了してリザルトを出しますか？")){const g=structuredClone(game);await endGame(g,"ギブアップ")}}
async function endGame(g,reason){g.status="ended";const rem=remaining(g);g.result={remaining:rem,reason};await saveGame(g);showResult(rem,reason)}
function getRank(rem){if(rem===0)return["PERFECT","perfect","全98枚を出し切った！"];if(rem<=4)return["AMAZING","amazing","ほぼ完全攻略。かなり惜しい！"];if(rem<=9)return["GREAT","great","かなり良い結果！"];return["TRY AGAIN","try","もう一度挑戦しよう。"]}
function showResult(rem,reason){const[rank,cls,msg]=getRank(rem);const overlay=document.getElementById("resultOverlay"),rankEl=document.getElementById("rankText");rankEl.textContent=rank;rankEl.className="rank "+cls;document.getElementById("resultDetail").textContent="残りカード："+rem+"枚";document.getElementById("resultMsg").textContent=reason+" / "+msg;overlay.style.display="flex";if(rem<=9){document.body.classList.add("flashWin");confetti(rem===0?120:70);playWin()}else{document.body.classList.add("shake");playLose()}setTimeout(()=>document.body.classList.remove("flashWin","shake"),1600)}function closeResult(){document.getElementById("resultOverlay").style.display="none"}
async function resetSameRoom(){document.body.dataset.resultShown="";closeResult();if(localMode){startSolo();return}if(game.hostId!==myId){alert("再開できるのは部屋を作った人だけです");return}const next=buildGame(game.playerCount,game.players);await updateDoc(doc(db,"rooms",roomId),next)}
function renderAll(){if(!game)return;document.getElementById("setup").style.display="none";document.getElementById("lobby").style.display=game.status==="lobby"?"block":"none";document.getElementById("game").style.display=game.status!=="lobby"?"block":"none";renderLobby();renderGame()}
function renderLobby(){if(!game||game.status!=="lobby")return;document.getElementById("lobbyStatus").innerHTML=`部屋ID：<b>${game.roomId}</b> / ${Object.keys(game.players||{}).length}/${game.playerCount}人`;document.getElementById("players").innerHTML=Object.values(game.players||{}).sort((a,b)=>a.seat-b.seat).map(p=>`<span class="badge">P${p.seat}: ${escapeHtml(p.name)}</span>`).join("");document.getElementById("startBtn").disabled=game.hostId!==myId}
function renderGame(){if(!game||game.status==="lobby")return;const myName=game.players?.[myId]?.name||"観戦",turnName=game.players?.[game.currentPlayer]?.name||"?",need=minPlay(game),rem=remaining(game);document.getElementById("status").innerHTML=`部屋：${game.roomId||"local"} / 自分：${escapeHtml(myName)}<br>現在ターン：<b>${escapeHtml(turnName)}</b> / 山札：${game.deck.length}枚 / 残り総数：${rem}枚<br>今ターン：${game.playedThisTurn}枚 / 必要：${need}枚`;document.getElementById("hint").textContent=isMyTurn()||localMode?"自分の手札を選んで、出したい場をタップ。":"相手のターンです。場の更新を待ってください。";const pilesDiv=document.getElementById("piles");pilesDiv.innerHTML="";game.piles.forEach((p,i)=>{const selected=selectedIndex!==null&&game.hands[myId];const can=selected&&canPlay(game.hands[myId][selectedIndex],p)&&(isMyTurn()||localMode);const div=document.createElement("div");div.className="pile"+(can?" can":"");div.onclick=()=>playPile(i);div.innerHTML=`<div class="pile-title">${p.name}</div><div class="pile-value">${p.value}</div><div class="small">${p.type==="up"?"大きい数字へ / 10戻し":"小さい数字へ / 10戻し"}</div>`;pilesDiv.appendChild(div)});document.getElementById("handTitle").textContent="自分の手札";const handDiv=document.getElementById("hand");handDiv.innerHTML="";if(!game.hands||!game.hands[myId]){handDiv.innerHTML='<div class="hidden">観戦中、または自分の手札がありません。</div>';return}const h=document.createElement("div");h.className="hand";game.hands[myId].forEach((card,i)=>{const c=document.createElement("div");c.className="card"+(selectedIndex===i?" selected":"")+((isMyTurn()||localMode)?"":" locked");c.textContent=card;c.onclick=()=>selectCard(i);h.appendChild(c)});handDiv.appendChild(h)}
function confetti(n){const colors=["#ffe066","#66a3ff","#54d17a","#ff5c5c","#ffffff"];for(let i=0;i<n;i++){const el=document.createElement("div");el.className="confetti";el.style.left=Math.random()*100+"vw";el.style.background=colors[i%colors.length];el.style.animationDelay=Math.random()*0.8+"s";el.style.transform=`rotate(${Math.random()*360}deg)`;document.body.appendChild(el);setTimeout(()=>el.remove(),3500)}}
function ensureAudio(){if(!audioCtx)audioCtx=new(window.AudioContext||window.webkitAudioContext)()}function beep(freq,dur,type="sine",vol=.08){ensureAudio();const o=audioCtx.createOscillator(),g=audioCtx.createGain();o.type=type;o.frequency.value=freq;g.gain.value=vol;o.connect(g);g.connect(audioCtx.destination);o.start();g.gain.exponentialRampToValueAtTime(.001,audioCtx.currentTime+dur);o.stop(audioCtx.currentTime+dur)}function playGood(){beep(660,.08,"triangle");setTimeout(()=>beep(880,.08,"triangle"),70)}function playBad(){beep(160,.16,"sawtooth")}function playWin(){[523,659,784,1046].forEach((f,i)=>setTimeout(()=>beep(f,.18,"triangle",.1),i*120))}function playLose(){[220,180,140].forEach((f,i)=>setTimeout(()=>beep(f,.25,"sawtooth",.08),i*160))}
function toggleBgm(){ensureAudio();if(bgmOn){clearInterval(bgmTimer);bgmOn=false;return}bgmOn=true;const notes=[262,330,392,330,294,370,440,370];let i=0;bgmTimer=setInterval(()=>{beep(notes[i%notes.length],.18,"sine",.035);i++},420)}
function showRules(){alert("昇順は大きい数字へ、降順は小さい数字へ。\nただし10戻しOK。\n山札がある間は最低2枚、山札切れ後は最低1枚。\n終了時の残り枚数で評価：0 PERFECT / 1〜4 AMAZING / 5〜9 GREAT / それ以上 TRY AGAIN")}function copyRoom(){navigator.clipboard?.writeText(roomId||game?.roomId||"");alert("部屋IDをコピーしました")}function leaveLocal(){location.reload()}function escapeHtml(s){return String(s).replace(/[&<>"']/g,m=>({"&":"&amp;","<":"&lt;",">":"&gt;","\"":"&quot;","'":"&#039;"}[m]))}
</script>
</body>
</html>
